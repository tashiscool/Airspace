quarkus.hibernate-orm.database.generation=none
quarkus.flyway.locations=db/migration
airspace.product.persistence.enabled=false
airspace.product.auth.required=false

%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:airspace_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.flyway.migrate-at-start=true

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:airspace_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.flyway.migrate-at-start=true

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${AIRSPACE_JDBC_URL:jdbc:postgresql://localhost:5432/airspace}
%prod.quarkus.datasource.username=${AIRSPACE_DB_USERNAME:airspace}
%prod.quarkus.datasource.password=${AIRSPACE_DB_PASSWORD:airspace}
%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.flyway.migrate-at-start=true
%prod.airspace.product.persistence.enabled=true
%prod.airspace.product.auth.required=true
